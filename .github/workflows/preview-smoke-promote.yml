name: Deploy Preview Smoke Promote

on:
  push:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check required Vercel secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=all_required_secrets_present" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing_VERCEL_TOKEN_or_VERCEL_ORG_ID" >> "$GITHUB_OUTPUT"
          fi

  deploy_preview:
    needs: preflight
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Vercel
        run: npx vercel build --token ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          url=$(npx vercel deploy --prebuilt \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }} \
            --confirm)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  smoke:
    needs: [preflight, deploy_preview]
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Wait for deployment
        run: |
          base_url="https://${{ needs.deploy_preview.outputs.url }}"
          for i in $(seq 1 10); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$base_url/api/markets?limit=1")
            if [ "$code" -ge 200 ] && [ "$code" -lt 500 ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Deployment not ready" >&2
          exit 1

      - name: Run smoke suite
        env:
          BASE_URL: https://${{ needs.deploy_preview.outputs.url }}
          BYPASS_HEADER: x-vercel-protection-bypass
          BYPASS_TOKEN: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: bash scripts/smoke.sh

  promote:
    needs: [preflight, deploy_preview, smoke]
    if: github.ref == 'refs/heads/main' && needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Promote to production
        run: npx vercel promote "https://${{ needs.deploy_preview.outputs.url }}" \
          --token ${{ secrets.VERCEL_TOKEN }} \
          --scope ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID }}

  deploy_skipped_notice:
    needs: preflight
    if: needs.preflight.outputs.can_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip condition
        run: |
          echo "Preview deploy skipped: ${{ needs.preflight.outputs.reason }}"
          echo "Set VERCEL_TOKEN and VERCEL_ORG_ID secrets to enable deploy/smoke/promote."
